aid: organon
name: Organon
description: >-
  Organon & Co. is a Fortune 500 global healthcare company focused on
  improving the health of women throughout their lives. Spun off from Merck
  in 2021, Organon's portfolio spans women's health, biosimilars, and
  established medicines across more than 140 markets worldwide. This
  repository captures any APIs, developer tools, and machine-readable API
  artifacts associated with Organon. No public developer APIs or
  documentation portal have been identified at this time.
